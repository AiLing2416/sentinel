app-id: io.github.ailing2416.sentinel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: sentinel
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=ssh-auth
  - --device=dri
  - --device=all
  - --filesystem=xdg-config/sentinel:create
  - --filesystem=xdg-run/app/io.github.ailing2416.sentinel:create
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=xdg-config/fontconfig:ro
  - --filesystem=~/.local/share/fonts:ro
  - --filesystem=~/.fonts:ro
  - --filesystem=/usr/share/fonts:ro

modules:
  - name: rclone
    buildsystem: simple
    build-commands:
      - install -D rclone /app/bin/rclone
    sources:
      - type: archive
        url: https://downloads.rclone.org/v1.73.2/rclone-v1.73.2-linux-amd64.zip
        sha256: 00a1d8cb85552b7b07bb0416559b2e78fcf9c6926662a52682d81b5f20c90535
        strip-components: 1
        only-arches: [x86_64]
      - type: archive
        url: https://downloads.rclone.org/v1.73.2/rclone-v1.73.2-linux-arm64.zip
        sha256: 2f7d8b807e6ea638855129052c834ca23aa538d3ad7786e30b8ad1e97c5db47b
        strip-components: 1
        only-arches: [aarch64]

  - name: bitwarden-cli
    buildsystem: simple
    build-commands:
      - install -D bw /app/bin/bw
    sources:
      - type: archive
        url: https://github.com/bitwarden/clients/releases/download/cli-v2026.2.0/bw-linux-2026.2.0.zip
        sha256: 8d73e2a471993db8b2e6e4f69293a71e28e9b4c2cb4b696665f5f396126e1850
        only-arches: [x86_64]
      - type: archive
        url: https://github.com/bitwarden/clients/releases/download/cli-v2026.2.0/bw-linux-arm64-2026.2.0.zip
        sha256: e714e09b753398a687ae6b6ef062180120354aa4583392f414c1cca9fecfca5e
        only-arches: [aarch64]

  - name: vte
    buildsystem: meson
    config-opts:
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dglade=false
      - -Dgir=true
      - -Dvapi=false
      - -Dgnutls=true
      - -Dicu=true
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.82/vte-0.82.3.tar.xz
        sha256: 6dc6278f6fee30d07d1a03e2ba3335b1ea4e8d2956ceb59d861943115d930a85

  - name: python3-dependencies
    build-options:
      build-args:
        - --share=network
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app asyncssh aiosqlite cryptography PyGObject
    sources:
      - type: shell
        commands:
          - echo "Dependencies handled via pip3"

  # Bundle Noto Sans Mono CJK SC fonts so CJK characters display correctly
  # on systems that do not have CJK monospace fonts installed.
  - name: noto-fonts-cjk
    buildsystem: simple
    build-commands:
      - install -Dm644 NotoSansMonoCJKsc-Regular.otf /app/share/fonts/noto/NotoSansMonoCJKsc-Regular.otf
      - install -Dm644 NotoSansMonoCJKsc-Bold.otf    /app/share/fonts/noto/NotoSansMonoCJKsc-Bold.otf
      - fc-cache /app/share/fonts/noto
    sources:
      - type: file
        url: https://github.com/googlefonts/noto-cjk/raw/main/Sans/Mono/NotoSansMonoCJKsc-Regular.otf
        sha256: ec04cc376b34887cedbdf84074e2e226ed2761eeabdcb9173fc1dd7bfd153ef7
        dest-filename: NotoSansMonoCJKsc-Regular.otf
      - type: file
        url: https://github.com/googlefonts/noto-cjk/raw/main/Sans/Mono/NotoSansMonoCJKsc-Bold.otf
        sha256: a452fedfc0619e43e080b7b861ce34cbd3ec4fbcea495bf8c402a5a02a5dcbdc
        dest-filename: NotoSansMonoCJKsc-Bold.otf

  - name: sentinel
    buildsystem: meson
    sources:
      - type: dir
        path: ..

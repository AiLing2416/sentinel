name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-build:
    name: Build ${{ matrix.variant }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            flatpak_arch: x86_64
            runner: ubuntu-latest
            manifest: flatpak/io.github.ailing2416.sentinel.yml
            bundle: sentinel-amd64.flatpak
            variant: slim
          - arch: amd64
            flatpak_arch: x86_64
            runner: ubuntu-latest
            manifest: flatpak/io.github.ailing2416.sentinel-full.yml
            bundle: sentinel-full-amd64.flatpak
            variant: full
          - arch: arm64
            flatpak_arch: aarch64
            runner: ubuntu-24.04-arm
            manifest: flatpak/io.github.ailing2416.sentinel.yml
            bundle: sentinel-arm64.flatpak
            variant: slim
          - arch: arm64
            flatpak_arch: aarch64
            runner: ubuntu-24.04-arm
            manifest: flatpak/io.github.ailing2416.sentinel-full.yml
            bundle: sentinel-full-arm64.flatpak
            variant: full

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flatpak and runtimes (system-level)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Platform//${{ matrix.flatpak_arch }}/50 \
            org.gnome.Sdk//${{ matrix.flatpak_arch }}/50

      - name: Build Sentinel (${{ matrix.variant }}, ${{ matrix.arch }})
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.bundle }}
          manifest-path: ${{ matrix.manifest }}
          arch: ${{ matrix.flatpak_arch }}
          cache: true
          restore-cache: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.bundle }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

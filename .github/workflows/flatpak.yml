name: Flatpak Build (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  flatpak-build:
    name: Build Sentinel (${{ matrix.arch }}, slim)
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            flatpak_arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            flatpak_arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak and runtimes (system-level)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            "org.gnome.Platform/${{ matrix.flatpak_arch }}/50" \
            "org.gnome.Sdk/${{ matrix.flatpak_arch }}/50"

      - name: Build Sentinel (${{ matrix.arch }}, slim)
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: sentinel-${{ matrix.arch }}.flatpak
          manifest-path: flatpak/io.github.ailing2416.sentinel.yml
          arch: ${{ matrix.flatpak_arch }}
          cache: true

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-${{ matrix.arch }}
          path: sentinel-${{ matrix.arch }}.flatpak

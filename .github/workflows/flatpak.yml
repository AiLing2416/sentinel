name: Flatpak Build (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  flatpak-build:
    name: Build Sentinel (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build Sentinel (${{ matrix.arch }}, slim)
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: sentinel-${{ matrix.arch }}.flatpak
          manifest-path: flatpak/io.github.ailing2416.sentinel.yml
          cache: true

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-${{ matrix.arch }}
          path: sentinel-${{ matrix.arch }}.flatpak
